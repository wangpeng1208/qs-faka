<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收银台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f7f8fa;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .header {
            background: #4375ff;
            color: #fff;
            padding: 16px 0;
        }
        .header__content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header__logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 500;
        }
        .header__order {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        .section {
            padding: 40px 0;
        }
        .content {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            text-align: center;
        }
        .order_title_tips {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        #qrcode {
            margin: 20px auto;
            display: flex;
            justify-content: center;
        }
        .order {
            color: #666;
            margin: 10px 0;
            font-size: 14px;
        }
        .price {
            font-size: 28px;
            font-weight: bold;
            color: #4375ff;
            margin: 10px 0;
        }
        .page_tip {
            font-size: 13px;
            color: #999;
            margin-top: 15px;
            line-height: 1.6;
        }
        .page_tip img {
            width: 16px;
            height: 16px;
            vertical-align: middle;
            margin-right: 4px;
        }
        .order_url {
            margin: 10px 0;
            font-size: 12px;
            word-break: break-all;
        }
        .copy {
            color: #4375ff;
            cursor: pointer;
            margin-left: 8px;
            border: none;
            background: none;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="header__content">
            <div class="header__logo">
                <span>收银台</span>
            </div>
            <a href="/order" class="header__order">
                <svg viewBox="0 0 1024 1024" width="18" height="18" fill="white">
                    <path d="M455.25 657.92c117.76 0 213.33-95.57 213.34-213.33s-95.57-213.33-213.34-213.34-213.33 95.57-213.33 213.34 95.57 213.33 213.33 213.33zm229.76-22.4l169.81 169.81c16.64 16.64 16.64 43.73 0 60.37-16.64 16.64-43.73 16.64-60.37 0l-172.8-172.8c-47.57 32-104.74 50.56-166.4 50.56-164.91 0-298.67-133.76-298.66-298.67s133.76-298.67 298.66-298.67 298.67 133.76 298.67 298.67c0 72.32-25.81 138.88-68.9 190.72z"></path>
                </svg>
                <span>订单查询</span>
            </a>
        </div>
    </div>
</header>

<div class="container">
    <section class="section">
        <div class="content">
            <h2 class="order_title_tips">{$title}</h2>
            <div class="isMobileWechat"></div>
            <div id="qrcode"></div>
            <div class="order">
                <span>订单号：{$data['out_trade_no']}</span>
            </div>
            <div class="price">
                <span>{$amount}</span>
                <span>元</span>
            </div>
            <div class="page_tip">
                <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAACiElEQVR4nO2a0XHDIAyGGcEjZISMkBE6QkfICNmgI3QEj+ARMoIegJ9Hj9A+WNy1vcbItrCcHN8drwYJ6UcWONdoNBqNRqNRESLqvPeXGOMNwAeAAcAdwMjjDqBPKX3GGG/e+4v1mjeTjU4pfbKRXytGH0J4t7ZlEUTUAbgCoJVGPxpXa9uKeO8vHM6ahv8cdMiI4F3vKxr+d9yJqLO22znnXAjhXCHcJWMMIZxNjeeQXytwWuPNxPgQwvsBjLdxAof9UuNHAEM+50MIZyLqiKjj771hOj2GNU7YLR1Y8JYo/QjgulS02BmLHLyLMEKu9mOM8bZ1UVw9Sp0waNn5Lxym0l1Xy8slKVetTlgQ+veU0kl7/pTSSTj/qD23c06ck1XPZt6EYiTEGG8WE6uG/SO49ihuhGoUCnP/Q23CAhJhVNUCgfLvcwQxHJFUWFO/22TqOSeAK9H6YigJ/xqqX4I3pn4aCNS/bvExv7bZ1FSJTG5pHSr8M4I02K4DAgG0+R11oiNxe3SiUH1ZNiUEOrBdCEsngIUAZvZywGwFaN2bK2yQigMOmwK8vjmNUtGAYc4B1rc4/Jf47+6rrA3TVdZcnplfWHC/IEfCCGBQi0yBA3Rq7qMCQSlsLYRVkfQCDnldpUmpHFY5bo6MoOY2/SeojrQXZ30kVgXCpqhlaVydQtmZB72sEyRaoFqFHZHSv8GfsVuneDeEHdlf0fBydQLX3lIH/CqbAVz59djJ2o5NCG9oJIMwvRE8Wdu0GEUn5JLa9s3PGpQfST3nn+WKVyMPBdPalk1g+wvR53ZABsvf9+RhdstUBXaE+E3Ry1aPzk2dJb7X7zE1WnOq6PbwGo1Go9FoNIR8A0fjmlx859ePAAAAAElFTkSuQmCC">
                <span>正在检测付款状态 <span class="count">1</span> 次</span>
                <div class="page_tip">
                    <span>付款成功后会自动跳转，未跳转时请耐心等待15秒</span>
                </div>
            </div>
        </div>
    </section>
</div>

<div class="toast" id="toast"></div>

<script>
    // ============== 配置 ==============
    const qrcodeUrl = "{$url}";
    const outTradeNo = "{$data['out_trade_no']}";
    const title = "{$title}";

    // ============== 原生 Toast ==============
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1500);
    }

    // ============== 原生复制 ==============
    function copyText(text) {
        const input = document.createElement('input');
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showToast('复制成功');
    }

    // ============== 简易二维码（原生实现） ==============
    function createQRCode(elId, text, size = 200) {
        const el = document.getElementById(elId);
        const img = document.createElement('img');
        img.width = size;
        img.height = size;
        // 调用免费公共二维码接口
        img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}`;
        el.appendChild(img);
    }

    // ============== 判断设备 ==============
    function isMobile() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    // ============== 订单轮询 ==============
    function checkOrder() {
        const countEl = document.querySelector('.count');
        fetch(`/home/order/orderStatus?trade_no=${outTradeNo}`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(res => res.json())
        .then(res => {
            if (res.code === 1) {
                showToast('支付成功');
                setTimeout(() => {
                    location.href = `/order?orderId=${outTradeNo}`;
                }, 1000);
            } else {
                countEl.textContent = parseInt(countEl.textContent) + 1;
                setTimeout(checkOrder, 3000);
            }
        })
        .catch(() => {
            countEl.textContent = parseInt(countEl.textContent) + 1;
            setTimeout(checkOrder, 3000);
        });
    }

    // ============== 初始化 ==============
    window.onload = function () {
        createQRCode('qrcode', qrcodeUrl);

        // 10秒后开始轮询
        setTimeout(checkOrder, 10000);

        // 微信移动端处理
        if (isMobile() && title.includes('微信')) {
            document.querySelector('.order_title_tips').textContent = '';
            document.querySelector('.isMobileWechat').innerHTML = `
                <h3>手机微信支付地址</h3>
                <div class="order order_url font12">
                    <div class="url">${qrcodeUrl}</div>
                    <button class="copy" onclick="copyText('${qrcodeUrl}')">复制</button>
                </div>
                <div class="page_tip">
                    <span>将链接发到微信打开即可支付</span>
                </div>
            `;
        }
    };
</script>

</body>
</html>
